<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Petrol Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="calculator-card">
        <header>
            <h1>Petrol Calculator</h1>
            <p>Enter your purchase details below</p>
        </header>

        <div class="form-container">
            <div class="input-group">
                <label for="price">Cost per Liter (£):</label>
                <input type="number" id="price" value="1.72" step="0.01">
            </div>

            <div class="input-group">
                <label for="liters">Liters Purchased:</label>
                <input type="number" id="liters" value="0" step="0.1">
            </div>

            <button id="calc-btn">Calculate Total Cost</button>
        </div>

        <footer class="result-area">
            <p id="total-output">Total Cost: £0.00</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
